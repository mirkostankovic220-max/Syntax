<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syntax AI - Developer Chatbot</title>
  <style>
    :root {
      --bg-dark: #0d1117;
      --bg-card: #161b22;
      --border-color: #30363d;
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --accent-blue: #58a6ff;
      --syntax-purple: #bc8cff;
      --user-msg-bg: #21262d;
      --bot-msg-bg: #161b22;
      --code-bg: #010409;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 800px;
      height: 100vh;
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    @media (min-width: 768px) {
      .chat-container {
        height: 90vh;
        border-radius: 8px;
      }
    }

    /* Header */
    .chat-header {
      padding: 12px 20px;
      background-color: var(--bg-dark);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      color: var(--syntax-purple);
      display: flex;
      align-items: center;
    }

    .brand h2 {
      font-size: 16px;
      font-weight: 600;
    }

    /* Model Selector Dropdown */
    .model-selector-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    select.model-select {
      background-color: var(--user-msg-bg);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
      font-weight: 500;
    }

    select.model-select:focus {
      border-color: var(--accent-blue);
    }

    /* Model Description Bar */
    .model-desc-bar {
      background-color: #0d111780;
      border-bottom: 1px solid var(--border-color);
      padding: 8px 20px;
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 10px;
      background-color: var(--user-msg-bg);
      border: 1px solid var(--border-color);
      color: var(--syntax-purple);
      font-weight: 600;
    }

    /* Messages Area */
    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message-wrapper {
      display: flex;
      gap: 12px;
      max-width: 88%;
    }

    .message-wrapper.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-wrapper.bot {
      align-self: flex-start;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: bold;
      flex-shrink: 0;
    }

    .user .avatar {
      background-color: var(--accent-blue);
      color: #fff;
    }

    .bot .avatar {
      background-color: var(--syntax-purple);
      color: #fff;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid var(--border-color);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user .bubble {
      background-color: var(--user-msg-bg);
    }

    .bot .bubble {
      background-color: var(--bot-msg-bg);
    }

    /* Code Blocks */
    pre {
      background-color: var(--code-bg);
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 13px;
      color: #e6edf3;
      overflow-x: auto;
      margin-top: 8px;
      margin-bottom: 8px;
    }

    /* Typing Dots */
    .typing-dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background-color: var(--text-muted);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* Input Footer */
    .chat-input-container {
      padding: 16px;
      background-color: var(--bg-dark);
      border-top: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .quick-commands {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
      overflow-x: auto;
      white-space: nowrap;
      padding-bottom: 4px;
    }

    .chip {
      background-color: var(--user-msg-bg);
      border: 1px solid var(--border-color);
      padding: 2px 8px;
      border-radius: 12px;
      cursor: pointer;
    }

    .chip:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    .input-box-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 8px 12px;
    }

    .input-box-wrapper:focus-within {
      border-color: var(--accent-blue);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 14px;
      resize: none;
      max-height: 120px;
      min-height: 24px;
    }

    button {
      background-color: #238636;
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background-color: #2ea043;
    }

    button:disabled {
      background-color: #21262d;
      color: var(--text-muted);
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <!-- Header -->
    <div class="chat-header">
      <div class="brand">
        <div class="brand-icon">
          <svg height="20" viewBox="0 0 16 16" width="20" fill="currentColor">
            <path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0ZM1.5 8a6.5 6.5 0 1 1 13 0 6.5 6.5 0 0 1-13 0Z"></path>
          </svg>
        </div>
        <h2>Syntax AI</h2>
      </div>

      <div class="model-selector-wrapper">
        <select id="modelSelect" class="model-select"></select>
      </div>
    </div>

    <!-- Model Description Banner -->
    <div class="model-desc-bar">
      <span id="modelBadge" class="badge">Fast</span>
      <span id="modelDescription">Loading model details...</span>
    </div>

    <!-- Message Scroll Area -->
    <div class="chat-messages" id="messages">
      <div class="message-wrapper bot">
        <div class="avatar">⚡</div>
        <div class="bubble">
          Hello! I am <strong>Syntax AI</strong>. Select a model at the top and ask a question, or use commands like <code>/explain</code>, <code>/fix</code>, or <code>/clear</code>.
        </div>
      </div>
    </div>

    <!-- Input Footer -->
    <div class="chat-input-container">
      <div class="quick-commands">
        <span class="chip" onclick="insertCommand('/explain ')">/explain</span>
        <span class="chip" onclick="insertCommand('/fix ')">/fix</span>
        <span class="chip" onclick="insertCommand('/clear')">/clear</span>
      </div>

      <div class="input-box-wrapper">
        <textarea id="userInput" placeholder="Ask Syntax or type '/'..." rows="1"></textarea>
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <!-- Load Configuration File -->
  <script src="config.js"></script>

  <script>
    const messagesContainer = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const modelSelect = document.getElementById('modelSelect');
    const modelBadge = document.getElementById('modelBadge');
    const modelDescription = document.getElementById('modelDescription');

    let conversationHistory = [
      { role: "system", content: "You are Syntax AI, an expert programming assistant integrated into GitHub. Provide concise, clean code with brief explanations." }
    ];

    // Initialize Models in Selector
    function initModelSelector() {
      modelSelect.innerHTML = '';
      for (const [key, modelObj] of Object.entries(CONFIG.MODELS)) {
        const option = document.createElement('option');
        option.value = key;
        option.textContent = modelObj.name;
        modelSelect.appendChild(option);
      }
      updateModelInfo();
    }

    function updateModelInfo() {
      const selectedKey = modelSelect.value;
      const activeModel = CONFIG.MODELS[selectedKey];
      if (activeModel) {
        modelBadge.textContent = activeModel.badge;
        modelDescription.textContent = activeModel.description;
      }
    }

    modelSelect.addEventListener('change', updateModelInfo);

    // Auto-resize textarea
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = userInput.scrollHeight + 'px';
    });

    function insertCommand(cmd) {
      if (cmd === '/clear') {
        clearChat();
        return;
      }
      userInput.value = cmd;
      userInput.focus();
    }

    function clearChat() {
      messagesContainer.innerHTML = '';
      conversationHistory = [
        { role: "system", content: "You are Syntax AI, an expert programming assistant integrated into GitHub." }
      ];
      appendMessage('bot', 'Chat history cleared.');
    }

    function escapeHtml(unsafe) {
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function appendMessage(sender, text) {
      const wrapper = document.createElement('div');
      wrapper.classList.add('message-wrapper', sender);

      const avatar = document.createElement('div');
      avatar.classList.add('avatar');
      avatar.textContent = sender === 'user' ? 'U' : '⚡';

      const bubble = document.createElement('div');
      bubble.classList.add('bubble');

      // Basic Markdown code block rendering logic with HTML escaping
      if (text.includes('```')) {
        let formattedText = text.replace(/```([\s\S]*?)```/g, function(match, code) {
            return '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>';
        });
        bubble.innerHTML = formattedText;
      } else {
        bubble.textContent = text;
      }

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      messagesContainer.appendChild(wrapper);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function showTypingIndicator() {
      const wrapper = document.createElement('div');
      wrapper.classList.add('message-wrapper', 'bot');
      wrapper.id = 'typingIndicator';
      wrapper.innerHTML = `
        <div class="avatar">⚡</div>
        <div class="bubble typing-dots">
          <span></span><span></span><span></span>
        </div>
      `;
      messagesContainer.appendChild(wrapper);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function removeTypingIndicator() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) indicator.remove();
    }

    async function callOpenRouterAPI(userPrompt) {
      const activeModel = CONFIG.MODELS[modelSelect.value];

      if (!CONFIG.OPENROUTER_API_KEY || CONFIG.OPENROUTER_API_KEY.includes("YOUR_OPENROUTER_API_KEY")) {
        return "⚠️ **OpenRouter API Key Missing:** Please add your key inside `config.js` to enable real AI responses.";
      }

      conversationHistory.push({ role: "user", content: userPrompt });

      try {
        const cleanApiKey = CONFIG.OPENROUTER_API_KEY.replace(/[\r\n\s]+/g, '');

        const response = await fetch("[https://openrouter.ai/api/v1/chat/completions](https://openrouter.ai/api/v1/chat/completions)", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${cleanApiKey}`,
            "Content-Type": "application/json",
            "HTTP-Referer": "[https://github.com/syntax-ai](https://github.com/syntax-ai)",
            "X-Title": "Syntax AI"
          },
          body: JSON.stringify({
            model: activeModel.modelId,
            messages: conversationHistory
          })
        });

        // 1. Read as text FIRST to prevent JSON crashes on HTML pages
        const rawText = await response.text();

        // 2. Safely attempt to parse the text as JSON
        let data;
        try {
          data = JSON.parse(rawText);
        } catch (parseError) {
          console.error("HTML Intercepted:", rawText.substring(0, 300));
          
          if (!response.ok) {
             return `⚠️ Cloudflare Block (Status ${response.status}): OpenRouter's security firewall flagged your phone's network IP and returned a CAPTCHA page.`;
          } else {
             return `⚠️ Wi-Fi / Network Intercept: Your phone's network returned an HTML webpage instead of API data. If you are on public Wi-Fi, you may need to log in.`;
          }
        }

        // 3. Normal JSON processing
        if (!response.ok) {
           return `API Error (${response.status}): ${data?.error?.message || 'Unknown error'}`;
        }
        
        if (data.choices && data.choices.length > 0) {
          const aiReply = data.choices[0].message.content;
          conversationHistory.push({ role: "assistant", content: aiReply });
          return aiReply;
        } else if (data.error) {
          return `API Error: ${data.error.message || 'Failed to fetch model response.'}`;
        } else {
          return "Unexpected response format from OpenRouter.";
        }
      } catch (err) {
        return `Connection Error: ${err.message}`;
      }
    }

    async function processMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      appendMessage('user', text);
      userInput.value = '';
      userInput.style.height = 'auto';

      if (text.startsWith('/clear')) {
        clearChat();
        return;
      }

      sendBtn.disabled = true;
      showTypingIndicator();

      const responseText = await callOpenRouterAPI(text);

      removeTypingIndicator();
      appendMessage('bot', responseText);
      sendBtn.disabled = false;
    }

    sendBtn.addEventListener('click', processMessage);

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        processMessage();
      }
    });

    // Initialize UI
    initModelSelector();
  </script>
</body>
</html>
